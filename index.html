<script type="module">
import * as THREE from 'three';

/* ===== Juan's character builders (verbatim) ===== */
// A soft, slightly glossy "toy plastic" material — realistic light, cute feel.
function toy(color, opts = {}) {
  return new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness ?? 0.55, metalness: opts.metalness ?? 0.0,
    emissive: opts.emissive ?? 0x000000, emissiveIntensity: opts.emissiveIntensity ?? 1,
    ...opts.extra
  });
}

// One shared eye look for cohesion: glossy dark dome + white catchlight.
function makeEye(radius = 0.16) {
  const g = new THREE.Group();
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x1a1c22, roughness: 0.15, metalness: 0.1 })
  );
  const spark = new THREE.Mesh(
    new THREE.SphereGeometry(radius * 0.32, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, emissive: 0xffffff, emissiveIntensity: 0.4 })
  );
  spark.position.set(radius * 0.35, radius * 0.35, radius * 0.72);
  g.add(ball, spark);
  return g;
}

/* ============================================================
   1) BUTTERFLY  (Art)  — wings flap, body bobs
   ============================================================ */
function buildButterfly() {
  const root = new THREE.Group();
  const body = new THREE.Group();
  root.add(body);

  const beige = toy(0xe8d3a8, { roughness: 0.62 });   // warm beige
  const brown = toy(0x8a5a3a, { roughness: 0.62 });   // brown

  // Stacked body: beige head + abdomen, brown thorax and abdomen tip.
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), beige);
  head.position.y = 0.55;
  const thorax = new THREE.Mesh(new THREE.SphereGeometry(0.34, 32, 32), brown);
  const abdomen = new THREE.Mesh(new THREE.SphereGeometry(0.26, 32, 32), beige);
  abdomen.position.y = -0.5; abdomen.scale.y = 1.5;
  const abTip = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24, 24), brown);
  abTip.position.y = -0.92;
  body.add(head, thorax, abdomen, abTip);

  // Big eyes
  const eyeL = makeEye(0.24), eyeR = makeEye(0.24);
  eyeL.position.set(-0.19, 0.58, 0.32);
  eyeR.position.set(0.19, 0.58, 0.32);
  body.add(eyeL, eyeR);

  // Antennae: rooted on top of the head, splayed out with club tips
  for (const s of [-1, 1]) {
    const ant = new THREE.Group();
    const len = 0.55;
    const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.03, len, 10),
      toy(0x6b4a30, { roughness: 0.6 }));
    stalk.position.y = len / 2;                       // base sits at the group origin
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 14), toy(0x6b4a30));
    tip.position.y = len;                             // club tip at the end
    ant.add(stalk, tip);
    ant.position.set(s * 0.14, 0.92, 0.16);
    ant.rotation.z = -s * 0.35;                       // splay outward, no crossing
    ant.rotation.x = -0.3;                            // lean forward
    body.add(ant);
  }

  // --- Wings ---
  // Build a wing silhouette once; reuse for upper + lower, mirrored per side.
  function wingShape(w, h) {
    const s = new THREE.Shape();
    s.moveTo(0, 0);
    s.bezierCurveTo(0.1 * w, 0.6 * h, 0.6 * w, 1.0 * h, 1.0 * w, 0.55 * h);
    s.bezierCurveTo(1.15 * w, 0.2 * h, 0.9 * w, -0.15 * h, 0.5 * w, -0.15 * h);
    s.bezierCurveTo(0.2 * w, -0.15 * h, 0.05 * w, -0.05 * h, 0, 0);
    return s;
  }
  const wingGeoUpper = new THREE.ExtrudeGeometry(wingShape(1.5, 1.5),
    { depth: 0.04, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 2 });
  const wingGeoLower = new THREE.ExtrudeGeometry(wingShape(1.15, 1.05),
    { depth: 0.04, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 2 });

  const wingMatUpper = toy(0x7b5cff, { roughness: 0.4 });    // vivid violet
  const wingMatLower = toy(0xff5ca8, { roughness: 0.4 });    // hot pink
  const wingEdge = toy(0x2a2540, { roughness: 0.5 });        // dark rim
  const spotMat = toy(0xffd23f, { roughness: 0.45 });        // bright yellow spot

  const wingPivots = [];
  function addWing(geo, side, yOff, tilt) {
    const pivot = new THREE.Group();                 // pivot sits at the wing root
    const wg = new THREE.Group();                    // mirror the whole wing as one unit
    const colMat = (geo === wingGeoUpper ? wingMatUpper : wingMatLower);
    const wing = new THREE.Mesh(geo, colMat);
    const rim = new THREE.Mesh(geo, wingEdge);
    rim.scale.set(1.08, 1.08, 0.55);                 // larger + thin: dark edge ring on both faces
    const sy = 0.45 * (geo === wingGeoUpper ? 1 : 0.7);   // dot on the FRONT and BACK face
    const spotF = new THREE.Mesh(new THREE.CircleGeometry(0.26, 24), spotMat);
    spotF.position.set(0.95, sy, 0.14);
    const spotB = new THREE.Mesh(new THREE.CircleGeometry(0.26, 24), spotMat);
    spotB.position.set(0.95, sy, -0.09); spotB.rotation.y = Math.PI;
    wg.add(rim, wing, spotF, spotB);
    wg.scale.x = side;                               // mirror for right side
    pivot.add(wg);
    const isUpper = geo === wingGeoUpper;
    pivot.position.set(side * 0.12, yOff, isUpper ? 0.0 : -0.18);  // violet in front, pink behind
    pivot.rotation.x = -0.32;                        // incline wings back, clear of the body
    pivot.userData.side = side;
    pivot.userData.baseTilt = tilt;
    body.add(pivot);
    wingPivots.push(pivot);
    return pivot;
  }
  addWing(wingGeoUpper, -1, 0.32, 0.0);
  addWing(wingGeoUpper, 1, 0.32, 0.0);
  addWing(wingGeoLower, -1, -0.5, -0.15);
  addWing(wingGeoLower, 1, -0.5, -0.15);

  body.rotation.x = 0.65;   // pitch forward so it reads as flying, not hovering

  root.userData.update = (t) => {
    const sweep = (Math.sin(t * 8) * 0.5 + 0.5) * 1.2;   // 0..1.2, front-to-back
    wingPivots.forEach((p) => {
      const side = p.userData.side;
      p.rotation.y = side * 0.1 + side * sweep;           // sweep toward the back
    });
    body.position.y = Math.sin(t * 2.2) * 0.18;      // gentle float bob
    body.rotation.z = Math.sin(t * 1.4) * 0.05;
    root.rotation.y = Math.sin(t * 0.5) * 0.15;
  };
  return root;
}

/* ============================================================
   2) ROBOT  (Space)  — propeller spins, arms sway, grippers open/close
   ============================================================ */
function buildRobot() {
  const root = new THREE.Group();
  const body = new THREE.Group();
  root.add(body);

  const white = toy(0xf4f5f7, { roughness: 0.4 });
  const yellow = toy(0xffc94d, { roughness: 0.45 });
  const dark = toy(0x23252b, { roughness: 0.35, metalness: 0.2 });
  const glow = toy(0x45e0d8, { emissive: 0x45e0d8, emissiveIntensity: 1.4, roughness: 0.3 });

  // Head: rounded capsule-ish sphere
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 40, 40), white);
  head.position.y = 0.75; head.scale.set(1, 0.92, 0.95);
  // Visor
  const visor = new THREE.Mesh(new THREE.SphereGeometry(0.5, 40, 40, 0, Math.PI * 2, 0, Math.PI * 0.55), dark);
  visor.position.set(0, 0.8, 0.16); visor.rotation.x = 0.35; visor.scale.set(1, 0.85, 0.6);
  // Glowing eyes on the visor
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 24, 24), glow);
  const eR = eL.clone();
  eL.position.set(-0.2, 0.82, 0.48); eR.position.set(0.2, 0.82, 0.48);
  // Side ear-caps (yellow)
  for (const s of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.12, 24), yellow);
    ear.rotation.z = Math.PI / 2; ear.position.set(s * 0.6, 0.75, 0);
    body.add(ear);
  }
  body.add(head, visor, eL, eR);

  // Torso
  const torso = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), white);
  torso.scale.set(1, 0.9, 0.9); torso.position.y = 0.08;
  const belt = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.08, 16, 32), yellow);
  belt.rotation.x = Math.PI / 2; belt.position.y = 0.0;
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 20), glow);
  core.position.set(0, 0.05, 0.36);
  body.add(torso, belt, core);

  // Mast + big propeller on top (the "space" rotor)
  const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.28, 12), dark);
  mast.position.y = 1.44;
  body.add(mast);

  const prop = new THREE.Group();
  const hub = new THREE.Mesh(new THREE.SphereGeometry(0.13, 20, 20), yellow);
  prop.add(hub);
  const blades = 4;
  for (let i = 0; i < blades; i++) {
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.035, 0.2), white);
    blade.position.x = 0.55;                          // sweep out from the hub
    const arm = new THREE.Group();
    arm.add(blade);
    arm.rotation.y = (i / blades) * Math.PI * 2;
    prop.add(arm);
  }
  prop.position.y = 1.62;
  body.add(prop);

  // Arms: shoulder -> forearm -> gripper.  Grippers open/close.
  const arms = [];
  for (const s of [-1, 1]) {
    const arm = new THREE.Group();
    const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.13, 20, 20), dark);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.4, 16), white);
    upper.position.y = -0.24;
    const fore = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.06, 0.34, 16), yellow);
    fore.position.y = -0.55;
    // gripper: two fingers we can splay
    const fingerL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.16, 0.08), dark);
    const fingerR = fingerL.clone();
    fingerL.position.set(-0.05, -0.76, 0); fingerR.position.set(0.05, -0.76, 0);
    arm.add(shoulder, upper, fore, fingerL, fingerR);
    arm.position.set(s * 0.45, 0.12, 0.05);
    arm.rotation.z = s * 0.5;
    arm.userData = { side: s, fingerL, fingerR };
    body.add(arm);
    arms.push(arm);
  }

  root.userData.update = (t) => {
    prop.rotation.y = t * 14;                          // fast spin
    arms.forEach((a) => {
      a.rotation.z = a.userData.side * (0.5 + Math.sin(t * 2.5) * 0.25);
      a.rotation.x = Math.sin(t * 2.5 + a.userData.side) * 0.2;
      const open = (Math.sin(t * 3) * 0.5 + 0.5) * 0.06;   // grippers open/close
      a.userData.fingerL.position.x = -0.05 - open;
      a.userData.fingerR.position.x = 0.05 + open;
    });
    body.position.y = Math.sin(t * 1.8) * 0.12;        // hover
    body.rotation.y = Math.sin(t * 0.6) * 0.2;
  };
  return root;
}

/* ============================================================
   3) FISH  (Biology)  — tail wags, fins flap, body sways as it swims
   ============================================================ */
function buildFish() {
  const root = new THREE.Group();
  const body = new THREE.Group();
  root.add(body);

  const bodyMat = toy(0xff8c42, { roughness: 0.45 });   // warm orange
  const bellyMat = toy(0xfff3e0, { roughness: 0.55 });  // cream belly
  const finMat = toy(0x2ec5d3, { roughness: 0.4 });     // teal fins

  // Body: rounded, elongated along X (nose at +X, tail at -X)
  const hull = new THREE.Mesh(new THREE.SphereGeometry(0.7, 40, 32), bodyMat);
  hull.scale.set(1.5, 0.95, 0.75);
  body.add(hull);

  // Cream belly patch
  const belly = new THREE.Mesh(new THREE.SphereGeometry(0.66, 32, 24), bellyMat);
  belly.scale.set(1.45, 0.6, 0.7); belly.position.y = -0.28;
  body.add(belly);

  // Big black eyes on both sides of the head
  const eyeL = makeEye(0.2), eyeR = makeEye(0.2);
  eyeL.position.set(0.72, 0.16, 0.34);
  eyeR.position.set(0.72, 0.16, -0.34);
  body.add(eyeL, eyeR);

  // Little mouth
  const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), toy(0xd9663a));
  mouth.scale.set(0.6, 0.5, 1); mouth.position.set(1.02, -0.12, 0);
  body.add(mouth);

  // Forked tail fin on a pivot that wags
  const tailPivot = new THREE.Group();
  tailPivot.position.set(-0.95, 0, 0);
  const tailShape = new THREE.Shape();
  tailShape.moveTo(0, 0);
  tailShape.lineTo(-0.75, 0.55);
  tailShape.lineTo(-0.5, 0);
  tailShape.lineTo(-0.75, -0.55);
  tailShape.closePath();
  const tailGeo = new THREE.ExtrudeGeometry(tailShape,
    { depth: 0.08, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 1 });
  tailGeo.translate(0, 0, -0.05);
  const tail = new THREE.Mesh(tailGeo, finMat);
  tailPivot.add(tail);
  body.add(tailPivot);

  // Dorsal fin (top)
  const dorsalShape = new THREE.Shape();
  dorsalShape.moveTo(0.3, 0.55);
  dorsalShape.lineTo(-0.35, 0.55);
  dorsalShape.lineTo(-0.05, 1.05);
  dorsalShape.closePath();
  const dorsalGeo = new THREE.ExtrudeGeometry(dorsalShape, { depth: 0.06, bevelEnabled: false });
  dorsalGeo.translate(0, 0, -0.03);
  body.add(new THREE.Mesh(dorsalGeo, finMat));

  // Pectoral fins (one each side) that flap
  const pecs = [];
  for (const s of [1, -1]) {
    const pecPivot = new THREE.Group();
    pecPivot.position.set(0.3, -0.1, s * 0.5);
    const pecShape = new THREE.Shape();
    pecShape.moveTo(0, 0);
    pecShape.lineTo(-0.15, 0.4);
    pecShape.lineTo(-0.5, 0.15);
    pecShape.closePath();
    const pecGeo = new THREE.ExtrudeGeometry(pecShape, { depth: 0.04, bevelEnabled: false });
    const pec = new THREE.Mesh(pecGeo, finMat);
    pec.rotation.x = s * Math.PI / 2;                 // lay fin flat to the side
    pecPivot.add(pec);
    pecPivot.userData.side = s;
    body.add(pecPivot);
    pecs.push(pecPivot);
  }

  root.userData.update = (t) => {
    tailPivot.rotation.y = Math.sin(t * 6) * 0.6;        // wag
    pecs.forEach((p) => {
      p.rotation.z = p.userData.side * (Math.sin(t * 5) * 0.3 + 0.2);
    });
    body.position.y = Math.sin(t * 2) * 0.16;           // float bob
    body.rotation.z = Math.sin(t * 1.6) * 0.06;
    root.rotation.y = -0.5 + Math.sin(t * 0.6) * 0.25;  // 3/4 view + gentle turn
  };
  return root;
}

function difficulty(L){return{
  speed:      Math.min(11 + (L-1)*0.9, 17),
  levelLength:380 + (L-1)*70,
  gapScale:   Math.max(1 - (L-1)*0.05, 0.66),
  starMul:    Math.min(1 + (L-1)*0.15, 1.8),
  goldChance: L>=2 ? Math.min(0.10 + (L-2)*0.04, 0.30) : 0,   // gold (double-point) stars unlock at level 2
  twoLaneBias:Math.min(0.5 + (L-1)*0.07, 0.85)                // higher levels close two lanes more often
};}

function themeGame(p){

  obMat=FLAT(p.ob,{roughness:0.7}); colMat=GLO(p.col,1.5); goldMat=goldMat||GLO(0xffd23f,2.2);
}
const CLR_Z=1.9, CLR_X=0.6, CLR_Y=0.7;   // star<->obstacle clearance (also keeps glow halos off walls); CLR_X<0.75 so adjacent lanes stay collectible
function clearStarsNear(cx,w,yLo,yHi,z){for(let i=stars.length-1;i>=0;i--){const s=stars[i];if(Math.abs(s.position.z-z)<CLR_Z&&Math.abs(s.position.x-cx)<w/2+CLR_X&&s.position.y+CLR_Y>yLo&&s.position.y-CLR_Y<yHi){gameRig.remove(s);stars.splice(i,1);}}}
function addWall(cx,w,yLo,yHi,z,fade){if(z<=-K.levelLength)return;const h=yHi-yLo;const mat=fade?Object.assign(obMat.clone(),{transparent:true}):obMat;const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,1.5),mat);m.position.set(cx,(yLo+yHi)/2,z);m.castShadow=!fade;m.userData={hw:w/2,yLo,yHi,fade:!!fade};gameRig.add(m);obstacles.push(m);clearStarsNear(cx,w,yLo,yHi,z);}
function starHitsObstacle(x,y,z){
  for(const o of obstacles){
    if(Math.abs(o.position.z-z)<CLR_Z && Math.abs(o.position.x-x)<o.userData.hw+CLR_X && y+CLR_Y>o.userData.yLo && y-CLR_Y<o.userData.yHi) return true;
  }
  return false;
}
// Rules enforced here: (1) nothing spawns past the finish line, (2) a star never overlaps an obstacle.
function addStar(x,y,z,kind){
  if(z<=-K.levelLength || starHitsObstacle(x,y,z))return;
  const gold=kind==='gold';
  const s=new THREE.Mesh(new THREE.IcosahedronGeometry(gold?0.40:0.34,0), gold?goldMat:colMat);
  s.position.set(x,y,z); s.add(glowSprite(gold?'rgba(255,214,90,.9)':'rgba(255,240,180,.7)', gold?1.4:1.1));
  s.userData={pts:gold?2:1,gold};
  gameRig.add(s); stars.push(s);
}
function starKind(){return Math.random()<K.goldChance?'gold':'normal';}
function coinsLane(li,y,z,n){n=Math.max(1,Math.round((n||4)*K.starMul/4));for(let i=0;i<n;i++)addStar(LANE_X[li],y,z+7+i*2.4,starKind());}

const PHRASES=[
  [['fly',13],['fly',13],['fly',15],['rest',22]],
  [['fly',16],['lane',16],['fly',16],['lane',18],['rest',22]],
  [['lane',15],['lane',15],['lane',17],['rest',20]],
  [['hump',12],['hump',12],['hump',14],['rest',22]],
  [['ceil',15],['fly',16],['ceil',15],['fly',16],['ceil',15],['rest',20]],
  [['tall',20],['ceil',18],['tall',20],['rest',24]],
  [['fly',16],['lane',18],['ceil',16],['hump',14],['rest',22]],
  [['fly',18],['rest',22]]
];
// Harder patterns enter the mix at level 3+. Add new tiers/types here to extend progression.
const PHRASES_HARD=[
  [['lane',13],['lane',13],['lane',15],['rest',18]],
  [['ceil',13],['fly',13],['ceil',13],['fly',13],['rest',18]],
  [['hump',11],['ceil',15],['hump',11],['ceil',15],['rest',18]],
  [['fly',12],['lane',13],['fly',12],['ceil',13],['fly',13],['rest',18]]
];

function nextEvent(){if(phrase.length===0)refill();return phrase.shift();}
// Shared lane-coverage rule for high AND low walls: mostly 1-2 lanes (left/middle/right combos), occasionally full. twoBias pushes toward more lanes at higher levels.
function laneSet(twoBias){
  if(Math.random()<0.15) return [0,1,2];                                  // full
  if(Math.random()<(twoBias||0.5)){const a=(Math.random()*3)|0;let b=(a+1+((Math.random()*2)|0))%3;return [a,b];} // two lanes
  return [(Math.random()*3)|0];                                            // one lane
}
function spawnEvent(type,z){
  // Every LOW obstacle top stays <=2.6; HIGH (ceil) walls hang from 3.3 to the ceiling and fade once behind you.
  if(type==='rest'){const n=Math.max(1,Math.round((4+(K.starMul-1)*3)/4));for(let i=0;i<n;i++){const y=2.7+(n>1?Math.sin(i/(n-1)*Math.PI)*1.3:0);addStar(LANE_X[1],y,z+7+i*2.4,starKind());}return;} // breather: coin arc, no walls
  if(type==='fly'){LANE_X.forEach(x=>addWall(x,laneW,0,2.4,z));coinsLane(1,3.6,z);}
  else if(type==='lane'){const cl=laneSet(K.twoLaneBias);cl.forEach(li=>addWall(LANE_X[li],laneW,0,2.4,z));const open=[0,1,2].filter(i=>!cl.includes(i));if(open.length)coinsLane(open[(Math.random()*open.length)|0],1.6,z);else coinsLane(1,3.5,z);}
  else if(type==='hump'){const hs=[0,1,2].filter(()=>Math.random()<0.6);if(hs.length===0)hs.push((Math.random()*3)|0);hs.forEach(li=>addWall(LANE_X[li],laneW,0,1.5,z));const openL=[0,1,2].find(i=>!hs.includes(i));coinsLane(openL===undefined?1:openL,openL===undefined?3.2:1.4,z);}
  else if(type==='ceil'){const cl=laneSet(K.twoLaneBias);cl.forEach(li=>addWall(LANE_X[li],laneW,3.3,CEIL,z,true));const open=[0,1,2].filter(i=>!cl.includes(i));if(open.length)coinsLane(open[(Math.random()*open.length)|0],2.3,z);else coinsLane(1,1.3,z);} // sidestep to an open lane, or dive under a full one
  else{const li=(Math.random()*3)|0;addWall(LANE_X[li],laneW,0,2.6,z);coinsLane(li,3.8,z);}
}

app.addEventListener('pointerdown',e=>{if(state!=='play')return;pd={x:e.clientX,y:e.clientY,t:performance.now()};});
app.addEventListener('pointerup',e=>{if(state!=='play'||!pd)return;const dx=e.clientX-pd.x,dy=e.clientY-pd.y,quick=(performance.now()-pd.t)<400;if(Math.abs(dx)>38&&Math.abs(dx)>Math.abs(dy)){if(mode==='normal')moveLane(dx>0?1:-1);}else if(Math.abs(dx)<16&&Math.abs(dy)<16&&quick){flap();}pd=null;});
addEventListener('keydown',e=>{if(state!=='play')return;const k=e.key.toLowerCase();if((k==='arrowleft'||k==='a')&&mode==='normal'){e.preventDefault();moveLane(-1);}else if((k==='arrowright'||k==='d')&&mode==='normal'){e.preventDefault();moveLane(1);}else if(k===' '||k==='arrowup'||k==='w'){e.preventDefault();flap();}});
function autoSteer(){let tl=null,near=Infinity;for(const s of stars){const dz=s.position.z-playerG.position.z;if(dz<0||dz>32)continue;if(dz<near){near=dz;tl=s.position.x;}}if(tl===null)return;lane=tl<-1.7?0:tl>1.7?2:1;}

/* ===== UI wiring ===== */
document.querySelectorAll('#topicSeg button').forEach(b=>b.addEventListener('click',()=>{if(state==='menu')applyTopic(b.dataset.t);}));
startBtn.addEventListener('click',()=>startGame('normal'));
document.querySelectorAll('#langtog button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.l)));
document.getElementById('again').addEventListener('click',()=>{level++;startGame(mode);});
document.getElementById('toMenu').addEventListener('click',showMenu);

/* ===== Loop ===== */
const clock=new THREE.Clock(); let t=0;
function updatePlay(dt){
  const move=K.speed*dt; traveled+=move;
  obstacles.forEach(o=>o.position.z+=move); stars.forEach(s=>{s.position.z+=move;s.rotation.y+=dt*2;}); if(finishArch)finishArch.position.z+=move;
  for(const o of obstacles)if(o.userData.fade){const z=o.position.z;o.material.opacity=z<1.5?1:Math.max(0,(5.5-z)/4);o.material.depthWrite=o.material.opacity>0.95;} // solid on approach + through the hit, gone before it reaches the lens
  grids.forEach(g=>{g.position.z+=move;if(g.position.z>45)g.position.z-=45*grids.length;});
  vy-=K.gravity*dt; playerG.position.y+=vy*dt;
  if(playerG.position.y<K.yMin){playerG.position.y=K.yMin;vy=0;} if(playerG.position.y>K.yMax){playerG.position.y=K.yMax;vy=0;}
  if(mode==='easy')autoSteer();
  playerG.position.x+=(LANE_X[lane]-playerG.position.x)*K.laneLerp;
  if(playerChar&&playerChar.userData.update)playerChar.userData.update(t);
  if(playerChar){playerChar.rotation.y=playerG.userData.face+(LANE_X[lane]-playerG.position.x)*-0.12;playerChar.rotation.z=(LANE_X[lane]-playerG.position.x)*0.14;}
  if(invuln>0){invuln-=dt;if(playerChar)playerChar.visible=Math.floor(invuln*20)%2===0;}else if(playerChar)playerChar.visible=true;
  for(let i=obstacles.length-1;i>=0;i--)if(obstacles[i].position.z>12){const o=obstacles[i];if(o.userData.fade&&o.material)o.material.dispose();gameRig.remove(o);obstacles.splice(i,1);}
  for(let i=stars.length-1;i>=0;i--)if(stars[i].position.z>12){gameRig.remove(stars[i]);stars.splice(i,1);}
  while(traveled>=nextSpawnTravel && traveled < K.levelLength+K.spawnAtZ-K.runIn){const ev=nextEvent();spawnEvent(ev.type,K.spawnAtZ);nextSpawnTravel += Math.max(ev.gap*K.gapScale, ev.type==='rest'?14:9);}
  const px=playerG.position.x,py=playerG.position.y;
  for(let i=stars.length-1;i>=0;i--){const s=stars[i];if(Math.abs(s.position.z)>1.5)continue;if(Math.abs(s.position.x-px)<1.2&&Math.abs(s.position.y-py)<1.3){gameRig.remove(s);stars.splice(i,1);score+=s.userData.pts||1;scoreEl.innerHTML='<span class="ic">★</span> '+score;scoreEl.setAttribute('aria-label','Points this run: '+score);}}
  for(const o of obstacles){if(Math.abs(o.position.z)>1.1)continue;if(Math.abs(o.position.x-px)<o.userData.hw+K.hitR&&py+0.7>o.userData.yLo&&py-0.7<o.userData.yHi){loseHeart();}}
  if(finishArch&&finishArch.position.z>0.5)showQuiz();
  const prog=Math.min(100,(traveled/K.levelLength)*100); barfill.style.width=prog.toFixed(1)+'%'; barEl.setAttribute('aria-valuenow',Math.round(prog));
}
function tick(){
  requestAnimationFrame(tick); const dt=Math.min(clock.getDelta(),0.033); t+=dt;
  points.rotation.y+=0.0005;
  if(state==='menu'||state==='difficulty'){
    camera.position.set(Math.sin(t*0.2)*0.9,1.5,6.4); camera.lookAt(0,0.5,-0.5);
    const c=menuChars[current]; if(c&&c.userData.update)c.userData.update(t);
    if(menuProps[current]&&menuProps[current].visible){menuProps[current].children.forEach(o=>{if(o.userData&&o.userData.sp){o.position.y+=Math.sin(t*o.userData.sp+o.position.x)*0.003;o.rotation.y+=0.01;}});}
  } else {
    if(state==='play')updatePlay(dt);
    const cx=playerG.position.x*0.35;
    camera.position.set(cx,5,9); camera.lookAt(cx,2.5,-5.5);
  }
  renderer.render(scene,camera);
}
applyLang('es'); showMenu(); tick();
requestAnimationFrame(()=>{moveKnob(langtogEl);moveKnob(topicSeg);layoutMenuHead();});   // settle after fonts/layout
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);moveKnob(langtogEl);moveKnob(topicSeg);layoutMenuHead();});
</script>
</body>
</html>
